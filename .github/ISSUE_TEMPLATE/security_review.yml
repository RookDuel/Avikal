name: Security review note
description: Report non-sensitive security design concerns for public discussion.
title: "[Security Review]: "
labels: ["security", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose exploitable vulnerabilities publicly. For private vulnerability reports, use the process in SECURITY.md.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Cryptographic design
        - Archive format / parser
        - PQC / keyfile handling
        - TimeCapsule / drand
        - Desktop runtime / IPC
        - CLI / packaging
        - Documentation claim
        - Other
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: Concern
      description: Describe the review concern without exploit details.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Potential impact
      description: What could this affect if confirmed?
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Add standards, papers, docs, or safe code references if relevant.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Disclosure checks
      options:
        - label: This report does not include live exploit steps, secrets, private keys, or sensitive user data.
          required: true
        - label: I will use SECURITY.md for private vulnerability disclosure if this becomes exploitable.
          required: true
