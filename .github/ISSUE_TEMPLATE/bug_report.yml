name: Bug report
description: Report a reproducible Avikal defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for reproducible product or packaging defects. Do not include passwords, keyphrases, private `.avkkey` files, decrypted files, or sensitive logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
      placeholder: What failed, and what did you expect instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop GUI
        - CLI
        - Archive encode/decode
        - TimeCapsule
        - PQC / keyfile
        - Aavrit
        - Packaging / installer
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest safe reproduction steps.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Actual result
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Avikal version
      placeholder: v1.0.4-beta
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Linux
        - macOS
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Safe logs or screenshots
      description: Add only redacted logs/screenshots. Remove secrets, file paths, tokens, keys, and private server details.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I have not attached passwords, keyphrases, private keyfiles, decrypted files, or sensitive logs.
          required: true
        - label: I understand unsolicited patches may not be accepted without prior maintainer review.
          required: true
