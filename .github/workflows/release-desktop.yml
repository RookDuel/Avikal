name: Release Windows Installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag of the GitHub release to attach Windows installer assets to
        required: true
        type: string
      release_channel:
        description: Frontend release channel for visible UI branding
        required: false
        default: production
        type: choice
        options:
          - beta
          - production

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  windows-installer:
    runs-on: windows-latest
    environment: release
    env:
      OPENSSL_VERSION: "3.5.6"
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      VITE_AVIKAL_RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.release_channel || (contains(github.ref_name, 'beta') && 'beta' || 'production') }}
      AVIKAL_RELEASE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.AVIKAL_RELEASE_SIGNING_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify exact release tag checkout
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Release tag is invalid: $env:RELEASE_TAG"
          }
          $tagCommit = (git rev-list -n 1 $env:RELEASE_TAG).Trim()
          $headCommit = (git rev-parse HEAD).Trim()
          if (-not $tagCommit -or $tagCommit -ne $headCommit) {
            throw "Checkout does not match release tag. Tag=$tagCommit HEAD=$headCommit"
          }
          "AVIKAL_SOURCE_COMMIT=$headCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          # Include all three lockfiles so the cache invalidates when any dep changes
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/scripts/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare backend virtual environment
        run: |
          python -m venv backend\venv
          backend\venv\Scripts\python.exe -m pip install --upgrade pip==26.0.1
          backend\venv\Scripts\python.exe -m pip install --require-hashes -r backend\requirements-lock-windows.txt

      - name: Restore OpenSSL PQC runtime artifact
        timeout-minutes: 5
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runtimeManifest = Join-Path $PWD "runtime\pqc\avikal-openssl-runtime.json"
          if (Test-Path -LiteralPath $runtimeManifest) {
            Write-Host "Using checked-out OpenSSL PQC runtime."
            return
          }

          $artifactName = "avikal-openssl-pqc-runtime-win-x64-openssl-$env:OPENSSL_VERSION"
          $artifactResponse = gh api "repos/$env:GITHUB_REPOSITORY/actions/artifacts?per_page=100" | ConvertFrom-Json
          $artifact = $artifactResponse.artifacts |
            Where-Object { $_.name -eq $artifactName -and -not $_.expired } |
            Sort-Object -Property created_at -Descending |
            Select-Object -First 1
          if (-not $artifact) {
            throw "Missing OpenSSL PQC runtime artifact '$artifactName'. Run the Build OpenSSL PQC Runtime workflow first."
          }

          $downloadRoot = Join-Path $PWD ".tmp_build\openssl-runtime-artifact"
          $outerZip = Join-Path $downloadRoot "artifact.zip"
          $outerExtract = Join-Path $downloadRoot "artifact"
          $runtimeRoot = Join-Path $PWD "runtime\pqc"
          Remove-Item -LiteralPath $downloadRoot -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $runtimeRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $downloadRoot -Force | Out-Null
          New-Item -ItemType Directory -Path $outerExtract -Force | Out-Null
          New-Item -ItemType Directory -Path $runtimeRoot -Force | Out-Null

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          Invoke-WebRequest -Uri $artifact.archive_download_url -Headers $headers -OutFile $outerZip
          Expand-Archive -LiteralPath $outerZip -DestinationPath $outerExtract -Force
          $runtimeZip = Get-ChildItem -LiteralPath $outerExtract -Filter "*.zip" -File -Recurse | Select-Object -First 1
          if (-not $runtimeZip) {
            throw "OpenSSL PQC runtime artifact '$artifactName' did not contain a runtime zip."
          }
          Expand-Archive -LiteralPath $runtimeZip.FullName -DestinationPath $runtimeRoot -Force
          if (-not (Test-Path -LiteralPath $runtimeManifest)) {
            throw "Downloaded OpenSSL PQC runtime is missing avikal-openssl-runtime.json."
          }
          Write-Host "Restored OpenSSL PQC runtime from artifact '$artifactName'."

      - name: Ensure PQC runtime is available
        shell: powershell
        run: |
          $runtimeManifest = Join-Path $PWD "runtime\pqc\avikal-openssl-runtime.json"
          if (-not (Test-Path -LiteralPath $runtimeManifest)) {
            throw "OpenSSL PQC runtime is missing. The release workflow requires a prebuilt runtime artifact."
          }

      - name: Install drand helper dependencies
        # Uses npm ci (not npm install) for reproducible installs from the lockfile.
        # backend/scripts/node_modules/ is gitignored; this step populates it on CI
        # so electron-builder can copy it into the packaged resources/backend/scripts/.
        run: npm ci
        working-directory: backend/scripts

      - name: Verify staged PQC runtime
        shell: powershell
        run: |
          $runtimeManifestPath = Resolve-Path runtime\pqc\avikal-openssl-runtime.json
          $runtimeManifest = Get-Content -LiteralPath $runtimeManifestPath | ConvertFrom-Json
          if (-not $runtimeManifest.version) {
            throw "runtime\\pqc\\avikal-openssl-runtime.json is missing the OpenSSL version."
          }

          $openssl = Resolve-Path runtime\pqc\bin\openssl.exe
          $opensslVersion = & $openssl version
          if ($opensslVersion -notmatch [regex]::Escape($runtimeManifest.version)) {
            throw "Bundled OpenSSL version mismatch. Manifest=$($runtimeManifest.version) Actual=$opensslVersion"
          }

          "AVIKAL_OPENSSL_VERSION=$($runtimeManifest.version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AVIKAL_OPENSSL_VERSION_TEXT=$opensslVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify drand helper works
        # Smoke-test: confirm node can resolve tlock-js before wasting 5 minutes on a full build
        run: |
          echo '{"action":"seal","unlock_timestamp":9999999999,"key_b_base64":"dGVzdA=="}' | node backend/scripts/drand_timelock_helper.mjs
        shell: bash

      - name: Build self-contained Windows GUI installer
        run: npm run package:windows

      - name: Build self-contained Windows CLI installer
        run: npm run package:windows:cli

      - name: Validate CLI installer staging
        timeout-minutes: 5
        shell: pwsh
        run: |
          $payloadRoot = Resolve-Path ".tmp_build\windows-cli-installer\payload"
          $required = @(
            "backend\avikal-backend.exe",
            "backend-runtime\pqc\bin\openssl.exe",
            "backend-runtime\avikal-runtime-integrity.json",
            "backend-runtime\avikal-runtime-integrity.json.sig"
          )
          foreach ($relativePath in $required) {
            $candidate = Join-Path $payloadRoot $relativePath
            if (-not (Test-Path -LiteralPath $candidate)) {
              throw "CLI installer staging is missing $relativePath"
            }
          }

      - name: Build unsigned Microsoft Store MSIX
        if: ${{ vars.AVIKAL_STORE_IDENTITY_NAME != '' && vars.AVIKAL_STORE_PUBLISHER != '' && vars.AVIKAL_STORE_PUBLISHER_DISPLAY_NAME != '' }}
        shell: pwsh
        env:
          AVIKAL_STORE_IDENTITY_NAME: ${{ vars.AVIKAL_STORE_IDENTITY_NAME }}
          AVIKAL_STORE_PUBLISHER: ${{ vars.AVIKAL_STORE_PUBLISHER }}
          AVIKAL_STORE_PUBLISHER_DISPLAY_NAME: ${{ vars.AVIKAL_STORE_PUBLISHER_DISPLAY_NAME }}
        run: packaging\windows\build-store-msix.ps1

      - name: Smoke-test Windows GUI installer
        timeout-minutes: 10
        shell: pwsh
        run: |
          function Invoke-ProcessWithTimeout {
            param(
              [Parameter(Mandatory = $true)][string]$FilePath,
              [string[]]$ArgumentList = @(),
              [int]$TimeoutSeconds = 300,
              [string]$Label = "process",
              [switch]$Hidden
            )
            $startProcessArgs = @{
              FilePath = $FilePath
              ArgumentList = $ArgumentList
              PassThru = $true
            }
            if ($Hidden) {
              $startProcessArgs.WindowStyle = 'Hidden'
            }
            $process = Start-Process @startProcessArgs
            if (-not $process.WaitForExit($TimeoutSeconds * 1000)) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              throw "$Label timed out after $TimeoutSeconds seconds."
            }
            return $process.ExitCode
          }

          $guiInstallerExe = (Resolve-Path "dist\RookDuel-Avikal.exe").Path
          $guiInstallDir = Join-Path $env:LOCALAPPDATA "Programs\RookDuel-Avikal"
          Remove-Item -LiteralPath $guiInstallDir -Recurse -Force -ErrorAction SilentlyContinue
          $installerExitCode = Invoke-ProcessWithTimeout -FilePath $guiInstallerExe -ArgumentList @("/S") -TimeoutSeconds 300 -Label "GUI installer"
          Write-Host "GUI installer exit code: $installerExitCode"
          if (Test-Path -LiteralPath $guiInstallDir) {
            Get-ChildItem -LiteralPath $guiInstallDir -Force -Recurse -ErrorAction SilentlyContinue | Select-Object -First 80 FullName,Length | Format-Table -AutoSize
          }
          if ($installerExitCode -ne 0) {
            throw "GUI installer failed during smoke test with exit code $installerExitCode."
          }
          $guiExecutable = Join-Path $guiInstallDir "RookDuel-Avikal.exe"
          if (-not (Test-Path -LiteralPath $guiExecutable)) {
            throw "GUI executable was not installed: $guiExecutable"
          }
          $env:AVIKAL_VERIFY_INSTALLATION = '1'
          try {
            $verifyExitCode = Invoke-ProcessWithTimeout -FilePath $guiExecutable -TimeoutSeconds 120 -Label "GUI runtime verification"
          }
          finally {
            Remove-Item Env:\AVIKAL_VERIFY_INSTALLATION -ErrorAction SilentlyContinue
          }
          if ($verifyExitCode -ne 0) {
            throw "Installed GUI runtime verification failed with exit code $verifyExitCode."
          }

      - name: Smoke-test Windows CLI installer
        timeout-minutes: 10
        shell: pwsh
        run: |
          function Invoke-ProcessWithTimeout {
            param(
              [Parameter(Mandatory = $true)][string]$FilePath,
              [string[]]$ArgumentList = @(),
              [int]$TimeoutSeconds = 300,
              [string]$Label = "process",
              [switch]$Hidden
            )
            $startProcessArgs = @{
              FilePath = $FilePath
              ArgumentList = $ArgumentList
              PassThru = $true
            }
            if ($Hidden) {
              $startProcessArgs.WindowStyle = 'Hidden'
            }
            $process = Start-Process @startProcessArgs
            if (-not $process.WaitForExit($TimeoutSeconds * 1000)) {
              Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
              throw "$Label timed out after $TimeoutSeconds seconds."
            }
            return $process.ExitCode
          }

          $cliInstallerExe = (Resolve-Path "dist\RookDuel-Avikal-CLI.exe").Path
          $cliInstallDir = Join-Path $env:LOCALAPPDATA "Programs\RookDuel-Avikal-CLI"
          Remove-Item -LiteralPath $cliInstallDir -Recurse -Force -ErrorAction SilentlyContinue
          $installerExitCode = Invoke-ProcessWithTimeout -FilePath $cliInstallerExe -ArgumentList @("/S") -TimeoutSeconds 300 -Label "CLI installer"
          Write-Host "CLI installer exit code: $installerExitCode"
          if (Test-Path -LiteralPath $cliInstallDir) {
            Get-ChildItem -LiteralPath $cliInstallDir -Force -Recurse -ErrorAction SilentlyContinue | Select-Object -First 80 FullName,Length | Format-Table -AutoSize
          }
          if ($installerExitCode -ne 0) {
            throw "CLI installer failed during smoke test with exit code $installerExitCode."
          }

          $cliLauncher = Join-Path $cliInstallDir "avikal.cmd"
          if (-not (Test-Path -LiteralPath $cliLauncher)) {
            throw "CLI launcher was not installed: $cliLauncher"
          }

          $verifyExitCode = Invoke-ProcessWithTimeout -FilePath $cliLauncher -ArgumentList @("--verify-runtime") -TimeoutSeconds 120 -Label "CLI runtime verification"
          if ($verifyExitCode -ne 0) {
            throw "Installed CLI runtime verification failed with exit code $verifyExitCode."
          }

          $helpExitCode = Invoke-ProcessWithTimeout -FilePath $cliLauncher -ArgumentList @("--help") -TimeoutSeconds 120 -Label "CLI help smoke test"
          if ($helpExitCode -ne 0) {
            throw "Installed CLI help smoke test failed with exit code $helpExitCode."
          }

      - name: Verify packaged runtimes and prepare release assets
        shell: powershell
        run: |
          $packagedOpenSsl = Resolve-Path dist\win-unpacked\resources\backend-runtime\pqc\bin\openssl.exe
          $packagedVersion = & $packagedOpenSsl version
          if ($packagedVersion -notmatch [regex]::Escape($env:AVIKAL_OPENSSL_VERSION)) {
            throw "Packaged OpenSSL runtime mismatch. Expected $env:AVIKAL_OPENSSL_VERSION but got $packagedVersion"
          }

          $installerExe = Join-Path (Resolve-Path dist) "RookDuel-Avikal.exe"
          if (-not (Test-Path -LiteralPath $installerExe)) {
            throw "Installer executable was not produced in dist."
          }
          if ((Get-Item -LiteralPath $installerExe).Length -lt 50MB) {
            throw "GUI installer is too small to be a bundled local installer. Refusing to release: $((Get-Item -LiteralPath $installerExe).Length) bytes."
          }

          $cliInstallerExe = Join-Path (Resolve-Path dist) "RookDuel-Avikal-CLI.exe"
          if (-not (Test-Path -LiteralPath $cliInstallerExe)) {
            throw "CLI installer executable was not produced in dist."
          }
          if ((Get-Item -LiteralPath $cliInstallerExe).Length -lt 25MB) {
            throw "CLI installer is too small to be a bundled local installer. Refusing to release: $((Get-Item -LiteralPath $cliInstallerExe).Length) bytes."
          }

          $installerHash = (Get-FileHash -LiteralPath $installerExe -Algorithm SHA256).Hash.ToLowerInvariant()
          $hashFilePath = "$installerExe.sha256"
          "$installerHash *$(Split-Path -Leaf $installerExe)" | Set-Content -LiteralPath $hashFilePath -NoNewline

          $cliInstallerHash = (Get-FileHash -LiteralPath $cliInstallerExe -Algorithm SHA256).Hash.ToLowerInvariant()
          $cliHashFilePath = "$cliInstallerExe.sha256"
          "$cliInstallerHash *$(Split-Path -Leaf $cliInstallerExe)" | Set-Content -LiteralPath $cliHashFilePath -NoNewline

          $metadata = [ordered]@{
            product_version = $env:RELEASE_TAG
            source_commit = $env:AVIKAL_SOURCE_COMMIT
            gui_installer_name = [System.IO.Path]::GetFileName($installerExe)
            gui_installer_sha256 = $installerHash
            cli_installer_name = [System.IO.Path]::GetFileName($cliInstallerExe)
            cli_installer_sha256 = $cliInstallerHash
            openssl_runtime_version = $env:AVIKAL_OPENSSL_VERSION
            openssl_runtime_version_text = $packagedVersion
            packaging_model = "bundled-gui-and-direct-bundled-cli"
          }
          $metadata | ConvertTo-Json | Set-Content -LiteralPath dist\avikal-release-metadata.json -Encoding utf8NoBOM

      - name: Sign release metadata
        run: node scripts/sign_release_metadata.js dist/avikal-release-metadata.json

      - name: Generate packaged SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .app-build
          format: cyclonedx-json
          output-file: dist/avikal-sbom.cdx.json
          upload-artifact: false

      - name: Verify release version, assets, and hashes
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File packaging\windows\verify-release-consistency.ps1 -ReleaseTag $env:RELEASE_TAG

      - name: Upload Windows installer artifacts to workflow
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: avikal-windows-installers
          path: |
            dist/RookDuel-Avikal.exe
            dist/RookDuel-Avikal.exe.sha256
            dist/RookDuel-Avikal-CLI.exe
            dist/RookDuel-Avikal-CLI.exe.sha256
            dist/avikal-release-metadata.json
            dist/avikal-release-metadata.json.sig
            dist/avikal-cli-release-metadata.json
            dist/avikal-sbom.cdx.json

      - name: Upload Microsoft Store MSIX artifact
        if: ${{ vars.AVIKAL_STORE_IDENTITY_NAME != '' && vars.AVIKAL_STORE_PUBLISHER != '' && vars.AVIKAL_STORE_PUBLISHER_DISPLAY_NAME != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: avikal-microsoft-store-msix
          path: dist/RookDuel-Avikal-Store.appx
          if-no-files-found: error

      - name: Attest Windows installer provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/RookDuel-Avikal.exe
            dist/RookDuel-Avikal-CLI.exe

      - name: Attest packaged SBOM
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2
        with:
          subject-path: dist/RookDuel-Avikal.exe
          sbom-path: dist/avikal-sbom.cdx.json

      - name: Upload Windows installers to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/RookDuel-Avikal.exe
            dist/RookDuel-Avikal.exe.sha256
            dist/RookDuel-Avikal-CLI.exe
            dist/RookDuel-Avikal-CLI.exe.sha256
            dist/avikal-release-metadata.json
            dist/avikal-release-metadata.json.sig
            dist/avikal-cli-release-metadata.json
            dist/avikal-sbom.cdx.json
