name: Release Windows Installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag of the GitHub release to attach Windows installer assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      OPENSSL_VERSION: "3.5.6"
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # Include all three lockfiles so the cache invalidates when any dep changes
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/scripts/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Prepare backend virtual environment
        run: |
          python -m venv backend\venv
          backend\venv\Scripts\python.exe -m pip install --upgrade pip
          backend\venv\Scripts\python.exe -m pip install -r backend\requirements.txt
          backend\venv\Scripts\python.exe -m pip install -r backend\requirements-build.txt

      - name: Install OpenSSL PQC runtime build tools
        shell: powershell
        run: |
          choco install strawberryperl nasm nsis -y --no-progress
          "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Strawberry\c\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure PQC runtime is available
        shell: powershell
        run: |
          $runtimeManifest = Join-Path $PWD "runtime\pqc\avikal-openssl-runtime.json"
          if (-not (Test-Path -LiteralPath $runtimeManifest)) {
            powershell -ExecutionPolicy Bypass -File scripts\build_openssl_runtime.ps1 -Version $env:OPENSSL_VERSION
          }

      - name: Install drand helper dependencies
        # Uses npm ci (not npm install) for reproducible installs from the lockfile.
        # backend/scripts/node_modules/ is gitignored; this step populates it on CI
        # so electron-builder can copy it into the packaged resources/backend/scripts/.
        run: npm ci
        working-directory: backend/scripts

      - name: Verify staged PQC runtime
        shell: powershell
        run: |
          $runtimeManifestPath = Resolve-Path runtime\pqc\avikal-openssl-runtime.json
          $runtimeManifest = Get-Content -LiteralPath $runtimeManifestPath | ConvertFrom-Json
          if (-not $runtimeManifest.version) {
            throw "runtime\\pqc\\avikal-openssl-runtime.json is missing the OpenSSL version."
          }

          $openssl = Resolve-Path runtime\pqc\bin\openssl.exe
          $opensslVersion = & $openssl version
          if ($opensslVersion -notmatch [regex]::Escape($runtimeManifest.version)) {
            throw "Bundled OpenSSL version mismatch. Manifest=$($runtimeManifest.version) Actual=$opensslVersion"
          }

          "AVIKAL_OPENSSL_VERSION=$($runtimeManifest.version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "AVIKAL_OPENSSL_VERSION_TEXT=$opensslVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify drand helper works
        # Smoke-test: confirm node can resolve tlock-js before wasting 5 minutes on a full build
        run: |
          echo '{"action":"seal","unlock_timestamp":9999999999,"key_b_base64":"dGVzdA=="}' | node backend/scripts/drand_timelock_helper.mjs
        shell: bash

      - name: Build self-contained Windows GUI installer
        run: npm run package:windows

      - name: Build self-contained Windows CLI installer
        run: npm run package:windows:cli

      - name: Smoke-test Windows CLI installer
        shell: powershell
        run: |
          $cliInstallerExe = (Resolve-Path "dist\RookDuel Avikal CLI-beta.exe").Path
          $cliInstallDir = Join-Path $env:LOCALAPPDATA "Programs\RookDuel Avikal CLI"
          $installerProcess = Start-Process -FilePath $cliInstallerExe -ArgumentList "/S" -Wait -PassThru
          $installerExitCode = $installerProcess.ExitCode
          Write-Host "CLI installer exit code: $installerExitCode"
          if (Test-Path -LiteralPath $cliInstallDir) {
            Get-ChildItem -LiteralPath $cliInstallDir -Force -Recurse -ErrorAction SilentlyContinue | Select-Object -First 80 FullName,Length | Format-Table -AutoSize
          }
          if ($installerExitCode -ne 0) {
            throw "CLI installer failed during smoke test with exit code $installerExitCode."
          }

          $cliLauncher = Join-Path $cliInstallDir "avikal.cmd"
          if (-not (Test-Path -LiteralPath $cliLauncher)) {
            throw "CLI launcher was not installed: $cliLauncher"
          }

          & $cliLauncher --verify-runtime
          if ($LASTEXITCODE -ne 0) {
            throw "Installed CLI runtime verification failed."
          }

          & $cliLauncher --help
          if ($LASTEXITCODE -ne 0) {
            throw "Installed CLI help smoke test failed."
          }

      - name: Verify packaged runtimes and prepare release assets
        shell: powershell
        run: |
          $packagedOpenSsl = Resolve-Path dist\win-unpacked\resources\backend-runtime\pqc\bin\openssl.exe
          $packagedVersion = & $packagedOpenSsl version
          if ($packagedVersion -notmatch [regex]::Escape($env:AVIKAL_OPENSSL_VERSION)) {
            throw "Packaged OpenSSL runtime mismatch. Expected $env:AVIKAL_OPENSSL_VERSION but got $packagedVersion"
          }

          $installerExe = Join-Path (Resolve-Path dist) "RookDuel Avikal-beta.exe"
          if (-not (Test-Path -LiteralPath $installerExe)) {
            throw "Installer executable was not produced in dist."
          }
          if ((Get-Item -LiteralPath $installerExe).Length -lt 50MB) {
            throw "GUI installer is too small to be a bundled local installer. Refusing to release: $((Get-Item -LiteralPath $installerExe).Length) bytes."
          }

          $cliInstallerExe = Join-Path (Resolve-Path dist) "RookDuel Avikal CLI-beta.exe"
          if (-not (Test-Path -LiteralPath $cliInstallerExe)) {
            throw "CLI installer executable was not produced in dist."
          }
          if ((Get-Item -LiteralPath $cliInstallerExe).Length -lt 25MB) {
            throw "CLI installer is too small to be a bundled local installer. Refusing to release: $((Get-Item -LiteralPath $cliInstallerExe).Length) bytes."
          }

          $installerHash = (Get-FileHash -LiteralPath $installerExe -Algorithm SHA256).Hash.ToLowerInvariant()
          $hashFilePath = "$installerExe.sha256"
          "$installerHash *$(Split-Path -Leaf $installerExe)" | Set-Content -LiteralPath $hashFilePath -NoNewline

          $cliInstallerHash = (Get-FileHash -LiteralPath $cliInstallerExe -Algorithm SHA256).Hash.ToLowerInvariant()
          $cliHashFilePath = "$cliInstallerExe.sha256"
          "$cliInstallerHash *$(Split-Path -Leaf $cliInstallerExe)" | Set-Content -LiteralPath $cliHashFilePath -NoNewline

          $metadata = [ordered]@{
            product_version = $env:RELEASE_TAG
            gui_installer_name = [System.IO.Path]::GetFileName($installerExe)
            gui_installer_sha256 = $installerHash
            cli_installer_name = [System.IO.Path]::GetFileName($cliInstallerExe)
            cli_installer_sha256 = $cliInstallerHash
            openssl_runtime_version = $env:AVIKAL_OPENSSL_VERSION
            openssl_runtime_version_text = $packagedVersion
            packaging_model = "bundled-gui-and-bundled-cli-with-shared-core-reuse"
          }
          $metadata | ConvertTo-Json | Set-Content -LiteralPath dist\avikal-release-metadata.json

      - name: Upload Windows installer artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: avikal-windows-installers
          path: |
            dist/RookDuel Avikal-beta.exe
            dist/RookDuel Avikal-beta.exe.sha256
            dist/RookDuel Avikal CLI-beta.exe
            dist/RookDuel Avikal CLI-beta.exe.sha256
            dist/avikal-release-metadata.json
            dist/avikal-cli-release-metadata.json

      - name: Upload Windows installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/RookDuel Avikal-beta.exe
            dist/RookDuel Avikal-beta.exe.sha256
            dist/RookDuel Avikal CLI-beta.exe
            dist/RookDuel Avikal CLI-beta.exe.sha256
            dist/avikal-release-metadata.json
            dist/avikal-cli-release-metadata.json
