name: Build OpenSSL PQC Runtime

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      openssl_version:
        description: "OpenSSL 3.5 LTS version to build"
        required: true
        default: "3.5.6"
  push:
    paths:
      - ".github/workflows/build-openssl-pqc-runtime.yml"
      - "scripts/build_openssl_runtime.ps1"
      - "scripts/install_pqc_runtime.ps1"
      - "backend/src/avikal_backend/archive/security/pqc_provider.py"
      - "backend/tests/test_pqc_provider.py"

jobs:
  windows-runtime:
    name: Windows x64 OpenSSL PQC Runtime
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      OPENSSL_VERSION: ${{ inputs.openssl_version || '3.5.6' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build tools
        shell: powershell
        run: |
          choco install strawberryperl --version=5.42.2.1 -y --no-progress
          choco install nasm --version=3.2.0 -y --no-progress
          "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Strawberry\c\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build OpenSSL runtime
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\build_openssl_runtime.ps1 -Version $env:OPENSSL_VERSION

      - name: Verify OpenSSL runtime
        shell: powershell
        run: |
          $openssl = Resolve-Path runtime\pqc\bin\openssl.exe
          & $openssl version
          & $openssl list -kem-algorithms | Select-String "ML-KEM-1024"
          & $openssl list -public-key-algorithms | Select-String "X25519"
          & $openssl list -signature-algorithms | Select-String "ML-DSA"
          & $openssl list -signature-algorithms | Select-String "SLH-DSA"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run PQC provider tests against bundled OpenSSL
        env:
          AVIKAL_OPENSSL_EXEC: ${{ github.workspace }}\runtime\pqc\bin\openssl.exe
          PYTHONPATH: ${{ github.workspace }}\backend\src
        run: python -m pytest backend/tests/test_pqc_provider.py -q

      - name: Package runtime artifact
        shell: powershell
        run: |
          $artifactName = "avikal-openssl-pqc-runtime-win-x64-openssl-$env:OPENSSL_VERSION"
          $artifactPath = Join-Path $PWD "$artifactName.zip"
          Compress-Archive -Path runtime\pqc\* -DestinationPath $artifactPath -Force
          Get-FileHash -LiteralPath $artifactPath -Algorithm SHA256 | Format-List

      - name: Upload runtime artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: avikal-openssl-pqc-runtime-win-x64-openssl-${{ env.OPENSSL_VERSION }}
          path: avikal-openssl-pqc-runtime-win-x64-openssl-${{ env.OPENSSL_VERSION }}.zip
          if-no-files-found: error
          retention-days: 30
