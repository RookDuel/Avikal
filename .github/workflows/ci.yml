name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Build frontend
        run: npm run build:check
        working-directory: frontend

  backend:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip==26.0.1
          pip install --require-hashes -r backend/requirements-lock-windows.txt
          pip install pip-audit==2.10.1 pytest==9.1.1

      - name: Audit backend Python dependencies
        run: |
          python -m pip_audit -r backend/requirements.txt
          python -m pip_audit -r backend/requirements-build.txt

      - name: Build native backend extension
        run: python backend/scripts/build_native_extension.py

      - name: Lint native Rust crypto core
        run: cargo clippy --locked -- -D warnings
        working-directory: backend/native/avikal_backend_native

      - name: Audit native Rust dependencies
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --deny warnings
        working-directory: backend/native/avikal_backend_native

      - name: Compile key backend modules
        run: |
          python -m py_compile backend/core_server.py
          python -m py_compile backend/src/avikal_backend/core/services.py
          python -m py_compile backend/src/avikal_backend/archive/pipeline/encoder.py
          python -m py_compile backend/src/avikal_backend/archive/pipeline/decoder.py

      - name: Check backend CLI
        env:
          PYTHONPATH: ${{ github.workspace }}\backend\src
        run: python -m avikal_backend --version

      - name: Run backend doctor
        env:
          PYTHONPATH: ${{ github.workspace }}\backend\src
        run: python -m avikal_backend doctor --json

      - name: Run targeted backend security tests
        env:
          PYTHONPATH: ${{ github.workspace }}\backend\src
        run: |
          python -m pytest backend/tests/test_native_crypto.py -q
          python -m pytest backend/tests/test_local_backend_security.py -q
          python -m pytest backend/tests/test_archive_security_guards.py -q
          python -m pytest backend/tests/test_archive_fuzz_smoke.py -q
          python -m pytest backend/tests/test_api_archive_routing.py -q
          python -m pytest backend/tests/test_archive_sessions.py -q
          python -m pytest backend/tests/test_assured_archive_features.py -q
          python -m pytest backend/tests/test_pqc_keychain_integrity.py -q
          python -m pytest backend/tests/test_pqc_keyfile_dual_password.py -q
          python -m pytest backend/tests/test_core_timecapsule_security.py -q
          python -m pytest backend/tests/test_drand_runtime.py -q
          python -m pytest backend/tests/test_multipart_volumes.py -q
          python -m pytest backend/tests/test_desktop_runtime_guards.py -q
          python -m pytest backend/tests/test_creator_trust_policy.py -q

      - name: Run native Rust tests
        run: cargo test --locked --quiet
        working-directory: backend/native/avikal_backend_native
